workflows:
  android-hybrid-app:
    name: StreamPlay Android Hybrid
    instance_type: mac_mini_m1
    max_build_duration: 60
    scripts:
      - name: Build Web e Preparar www
        script: |
          npm install
          npm run build
          # Garante que a pasta www existe e está limpa
          rm -rf www/*
          mkdir -p www
          # Copia o resultado do build do Vite para o Cordova
          cp -r dist/* www/
      - name: Construir o APK (Debug)
        script: |
          npm install -g cordova
          # Remove o type: module temporariamente para evitar conflitos com scripts do Cordova
          sed -i '' '/"type": "module"/d' package.json || true
          # Limpa e reconstrói a plataforma
          rm -rf platforms/ plugins/
          cordova platform add android --no-interactive
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add https://github.com/ollm/cordova-plugin-dynamic-color
          cordova build android --debug --no-interactive
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
